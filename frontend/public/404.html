<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Not Found</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <style>
      html,body{height:100%}body{margin:0;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#fff;font-family:Arial,Helvetica,sans-serif}
      .loader{display:flex;flex-direction:column;align-items:center;gap:.75rem}
      .spinner{width:48px;height:48px;border-radius:50%;border:5px solid rgba(255,255,255,.12);border-top-color:#60a5fa;animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    <div class="loader">
      <div class="spinner" aria-hidden></div>
      <div>Loading…</div>
    </div>
    <script>
      // Fallback for hosts that serve a 404 page for SPA routes.
      // Show a loader (above) while fetching `index.html` and injecting it.
      (function () {
        var original = location.pathname + location.search + location.hash;
        fetch('/index.html')
          .then(function (r) { return r.text(); })
          .then(function (html) {
            // Replace document with app while preserving URL
            document.open();
            document.write(html);
            document.close();
            try { history.replaceState(null, '', original); } catch (e) {}
          })
          .catch(function () {
            location.replace('/');
          });
      })();
    </script>
  </body>
</html>
